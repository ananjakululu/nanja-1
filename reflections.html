<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflective Journal | Alex</title>
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    /* --- CSS VARIABLES --- */
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --secondary: #ec4899;
      --accent-teal: #14b8a6;
      --accent-purple: #8b5cf6;
      
      --bg-body: #f8fafc;
      --bg-glass: rgba(255, 255, 255, 0.85);
      --bg-card: #ffffff;
      
      --text-main: #0f172a;
      --text-muted: #64748b;
      
      --border-color: rgba(226, 232, 240, 0.8);
      --nav-height: 70px;
      
      --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg-body: #0f172a;
      --bg-glass: rgba(30, 41, 59, 0.85);
      --bg-card: #1e293b;
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-body);
      color: var(--text-main);
      line-height: 1.7;
      transition: background-color 0.3s, color 0.3s;
      position: relative;
    }

    .bg-blob { position: fixed; border-radius: 50%; filter: blur(90px); z-index: -1; opacity: 0.4; }
    .blob-1 { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--primary); }
    .blob-2 { bottom: 10%; right: -5%; width: 350px; height: 350px; background: var(--secondary); }

    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; letter-spacing: -0.02em; }
    a { text-decoration: none; color: inherit; transition: var(--transition); }
    ul { list-style: none; }
    button { cursor: pointer; font-family: inherit; border: none; }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
    .text-muted { color: var(--text-muted); }

    /* --- NAVIGATION --- */
    nav {
      position: fixed; top: 0; width: 100%; z-index: 1000;
      height: var(--nav-height);
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px;
    }

    .logo { font-size: 1.5rem; font-weight: 700; }
    .nav-links { display: flex; gap: 2.5rem; }
    .nav-links a { font-weight: 500; color: var(--text-muted); font-size: 0.95rem; }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }
    
    .nav-actions { display: flex; align-items: center; gap: 1rem; }
    .theme-toggle { font-size: 1.2rem; color: var(--text-main); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: var(--transition); }
    .theme-toggle:hover { background: var(--border-color); }
    .mobile-menu-btn { display: none; font-size: 1.5rem; color: var(--text-main); }

    /* --- HERO --- */
    .page-hero {
      padding-top: calc(var(--nav-height) + 4rem);
      padding-bottom: 3rem;
      text-align: center;
    }
    .page-hero h1 { font-size: 3rem; margin-bottom: 1rem; }
    .page-hero p { font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

    /* --- FORM CARD (New Entry) --- */
    .content { padding-bottom: 6rem; }
    
    .form-card {
      background: linear-gradient(135deg, var(--bg-card) 0%, rgba(79, 70, 229, 0.03) 100%);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 2rem;
      margin-bottom: 4rem;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }
    
    .form-card::before {
      content: ''; position: absolute; top:0; left:0; width: 6px; height: 100%;
      background: var(--primary);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; text-align: left; }
    .form-group label { font-size: 0.9rem; font-weight: 600; color: var(--text-main); }
    
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 1rem;
      background: var(--bg-body);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      font-size: 1rem;
      transition: var(--transition);
    }
    
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .form-textarea { min-height: 150px; resize: vertical; }

    .btn-save {
      background: var(--primary); color: white;
      padding: 1rem 2rem; border-radius: 12px;
      font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem;
      transition: var(--transition);
      width: 100%; justify-content: center;
    }
    .btn-save:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--shadow-md); }

    /* --- TIMELINE (History) --- */
    .timeline { position: relative; max-width: 1000px; margin: 0 auto; padding: 2rem 0; }
    .timeline::before {
      content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
      background: var(--border-color); transform: translateX(-50%);
    }

    .timeline-item { position: relative; width: 50%; padding: 0 40px; margin-bottom: 3rem; }
    .timeline-item::after {
      content: ''; position: absolute; width: 16px; height: 16px;
      background: var(--bg-body); border: 4px solid var(--primary); border-radius: 50%; top: 20px;
    }
    .timeline-item:nth-child(odd) { left: 0; }
    .timeline-item:nth-child(odd)::after { right: -8px; }
    .timeline-item:nth-child(even) { left: 50%; }
    .timeline-item:nth-child(even)::after { left: -8px; }

    /* Saved Card Styling */
    .saved-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .card-meta { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    .project-tag { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 0.25rem 0.75rem; border-radius: 20px; }
    .tag-philosophy { background: rgba(20, 184, 166, 0.1); color: var(--accent-teal); }
    .tag-insight { background: rgba(79, 70, 229, 0.1); color: var(--primary); }
    .tag-design { background: rgba(139, 92, 246, 0.1); color: var(--accent-purple); }
    
    .date { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    
    .card-title { font-size: 1.4rem; margin-bottom: 1rem; color: var(--text-main); }
    .card-body { font-size: 1rem; line-height: 1.6; color: var(--text-muted); white-space: pre-wrap; } /* Pre-wrap preserves paragraphs */

    .card-actions {
      margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border-color);
      display: flex; justify-content: flex-end;
    }

    .btn-delete {
      color: #ef4444; background: rgba(239, 68, 68, 0.1);
      padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
      transition: var(--transition);
    }
    .btn-delete:hover { background: #ef4444; color: white; }

    /* Empty State */
    .empty-state { text-align: center; padding: 4rem; color: var(--text-muted); font-style: italic; }

    /* --- FOOTER --- */
    footer { text-align: center; padding: 2rem 0; border-top: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.9rem; margin-top: 4rem; }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .nav-links { display: none; }
      .mobile-menu-btn { display: block; }
      .nav-links.active { display: flex; flex-direction: column; position: absolute; top: var(--nav-height); left: 0; width: 100%; background: var(--bg-card); padding: 2rem; box-shadow: var(--shadow-lg); border-bottom: 1px solid var(--border-color); }
      
      .form-row { grid-template-columns: 1fr; gap: 1rem; }
      .timeline::before { left: 20px; }
      .timeline-item { width: 100%; padding-left: 50px; padding-right: 0; }
      .timeline-item:nth-child(even) { left: 0; }
      .timeline-item::after, .timeline-item:nth-child(even)::after { left: 11px; }
      
      .page-hero h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <!-- Background Decor -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="logo">Alex<span style="color: var(--primary)">.</span>N</a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="projects.html">Portfolio</a></li>
      <li><a href="reflections.html" class="active">Reflections</a></li>
      <li><a href="skills.html">Skills</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle Theme"><i class="ri-moon-line"></i></button>
      <button class="mobile-menu-btn" id="menuBtn" aria-label="Toggle Menu"><i class="ri-menu-line"></i></button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="page-hero">
    <div class="container">
      <h1 data-aos="fade-up">Reflective Journal</h1>
      <p data-aos="fade-up" data-aos-delay="100" class="text-muted">
        Document your journey. Create new entries below and watch them build your timeline.
      </p>
    </div>
  </section>

  <main class="container content" style="padding-top: 0;">
    
    <!-- SECTION: CREATE NEW ENTRY -->
    <div class="form-card" data-aos="fade-up">
      <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
        <i class="ri-edit-2-fill" style="color: var(--primary)"></i> New Entry
      </h3>
      
      <form id="reflectionForm">
        <div class="form-row">
          <div class="form-group">
            <label for="refDate">Date</label>
            <input type="date" id="refDate" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="refCategory">Category</label>
            <select id="refCategory" class="form-select" required>
              <option value="Philosophy">Philosophy</option>
              <option value="Lesson Insight">Lesson Insight</option>
              <option value="Curriculum">Curriculum</option>
              <option value="General">General</option>
            </select>
          </div>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label for="refTitle">Title</label>
          <input type="text" id="refTitle" class="form-input" placeholder="e.g. The Ethics of Technical Instruction" required>
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
          <label for="refContent">Reflection</label>
          <textarea id="refContent" class="form-textarea" placeholder="Type your detailed reflection here..." required></textarea>
        </div>

        <button type="submit" class="btn-save">
          <i class="ri-save-line"></i> Save to Journal
        </button>
      </form>
    </div>

    <!-- SECTION: HISTORY (TIMELINE) -->
    <div class="timeline" id="timelineContainer">
      <!-- Items will be injected here via JS -->
      <div class="empty-state">No reflections yet. Write your first one above!</div>
    </div>

  </main>

  <footer>
    <div class="container">&copy; 2024 Alex. All Rights Reserved.</div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // 1. Initialize AOS
    AOS.init({ duration: 800, once: true, offset: 50 });

    // 2. Theme & Menu Logic (Standard)
    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    const savedTheme = localStorage.getItem('theme') || 'light';
    htmlElement.setAttribute('data-theme', savedTheme);
    themeToggle.innerHTML = savedTheme === 'dark' ? '<i class="ri-sun-line"></i>' : '<i class="ri-moon-line"></i>';
    
    themeToggle.addEventListener('click', () => {
      const newTheme = htmlElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      htmlElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      themeToggle.innerHTML = newTheme === 'dark' ? '<i class="ri-sun-line"></i>' : '<i class="ri-moon-line"></i>';
    });

    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('nav-links');
    menuBtn.addEventListener('click', () => {
      navLinks.classList.toggle('active');
      menuBtn.querySelector('i').className = navLinks.classList.contains('active') ? 'ri-close-line' : 'ri-menu-line';
    });

    // 3. JOURNAL LOGIC (The core feature)
    const STORAGE_KEY = 'alex_reflections';
    const form = document.getElementById('reflectionForm');
    const timelineContainer = document.getElementById('timelineContainer');
    
    // Set default date to today
    document.getElementById('refDate').valueAsDate = new Date();

    // Load reflections on startup
    loadReflections();

    // Handle Form Submit
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const newReflection = {
        id: Date.now(), // Unique ID
        date: document.getElementById('refDate').value,
        category: document.getElementById('refCategory').value,
        title: document.getElementById('refTitle').value,
        content: document.getElementById('refContent').value
      };

      saveToStorage(newReflection);
      form.reset();
      document.getElementById('refDate').valueAsDate = new Date(); // Reset date to today
      loadReflections(); // Re-render
    });

    function saveToStorage(reflection) {
      const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      // Add to beginning of array
      existing.unshift(reflection);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));
    }

    function deleteReflection(id) {
      if(confirm('Are you sure you want to delete this entry?')) {
        const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const updated = existing.filter(ref => ref.id !== id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updated));
        loadReflections();
      }
    }

    function loadReflections() {
      const reflections = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      timelineContainer.innerHTML = '';

      if (reflections.length === 0) {
        timelineContainer.innerHTML = '<div class="empty-state">No reflections yet. Write your first one above!</div>';
        return;
      }

      reflections.forEach((ref, index) => {
        // Determine styling based on category
        let tagClass = 'tag-philosophy';
        if (ref.category === 'Lesson Insight') tagClass = 'tag-insight';
        if (ref.category === 'Curriculum') tagClass = 'tag-design';
        
        // Animation delay for staggering
        const delay = index * 100;
        
        const html = `
          <div class="timeline-item" data-aos="fade-up" data-aos-delay="${delay}">
            <div class="saved-card">
              <div class="card-meta">
                <span class="project-tag ${tagClass}">${ref.category}</span>
                <span class="date">${new Date(ref.date).toLocaleDateString()}</span>
              </div>
              <h3 class="card-title">${ref.title}</h3>
              <div class="card-body">${ref.content}</div>
              
              <div class="card-actions">
                <button class="btn-delete" onclick="deleteReflection(${ref.id})">
                  <i class="ri-delete-bin-line"></i> Delete
                </button>
              </div>
            </div>
          </div>
        `;
        
        timelineContainer.insertAdjacentHTML('beforeend', html);
      });
    }
  </script>
</body>
</html>
